<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jouer — Le Mot du Jour</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="page">

        <header class="entete entete--secondaire">
            <p class="fil-ariane"><a href="index.html">Accueil</a> / Jouer</p>
            <h1>Trouvez le mot du jour</h1>
            <div class="entete-separateur" aria-hidden="true"></div>
            <p class="entete-baseline">Proposez un mot, on vous dira si vous brûlez.</p>
        </header>

        <main class="contenu-jeu">

            <form id="formulaire-essai" class="formulaire-essai" autocomplete="off">
                <input
                    type="text"
                    id="champ-mot"
                    name="mot"
                    placeholder="Proposez un mot..."
                    aria-label="Votre proposition de mot"
                    required
                />
                <button type="submit">Essayer</button>
            </form>

            <p id="message-jeu" class="message-jeu" aria-live="polite"></p>

            <div id="liste-essais" class="demo-carte liste-essais"></div>

        </main>

        <footer class="pied">
            <a href="index.html">Accueil</a>
        </footer>

    </div>

    <script type="module" src="js/jeu.js"></script>

</body>
</html>
