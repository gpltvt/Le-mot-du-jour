name: Générer le mot du jour

on:
  schedule:
    - cron: "5 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  generer:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Générer le mot du jour
        run: python scripts/generer_mot_du_jour.py

      - name: Publier le nouveau fichier
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/mots/ data/historique.json
          git diff --quiet --cached || git commit -m "Mot du jour automatique"
          git push